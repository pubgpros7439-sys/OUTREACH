<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outreach 2026 | Control Hub</title>
  <meta name="description" content="Status dashboard for the automated, rate-limited email sending system.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent-cyan: #06b6d4;
      --accent-purple: #8b5cf6;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --status-green: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Background decorative gradients */
    body::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.15) 0%, rgba(0,0,0,0) 70%);
      top: -100px;
      left: -100px;
      z-index: 0;
    }

    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(0,0,0,0) 70%);
      bottom: -100px;
      right: -100px;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 550px;
      padding: 24px;
      z-index: 1;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 30px 50px rgba(6, 182, 212, 0.1);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 32px;
      font-weight: 300;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--status-green);
      margin-bottom: 36px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: var(--status-green);
      border-radius: 50%;
      position: relative;
    }

    .status-dot::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background-color: var(--status-green);
      border-radius: 50%;
      top: 0;
      left: 0;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(3.5);
        opacity: 0;
      }
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
      text-align: left;
    }

    .grid-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 16px;
      border-radius: 16px;
      transition: background 0.2s ease;
    }

    .grid-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .val {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .footer-text {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <main class="card">
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        System Active
      </div>
      <h1>Outreach 2026</h1>
      <p class="subtitle">Secure Google Sheets Email Sender Hub</p>
      
      <div class="grid">
        <div class="grid-item">
          <div class="label">Time Window</div>
          <div class="val">8:30 PM - 10:30 PM IST</div>
        </div>
        <div class="grid-item">
          <div class="label">Send Interval</div>
          <div class="val">2 Minutes (1/run)</div>
        </div>
        <div class="grid-item">
          <div class="label">Daily Limit</div>
          <div class="val">30 Emails Max</div>
        </div>
        <div class="grid-item">
          <div class="label">Target Engine</div>
          <div class="val">Zoho Mail SMTP</div>
        </div>
      </div>
      
      <p class="footer-text">
        API Endpoint active at <code>/api/cron-handler</code>.<br>
        Request must include a valid Bearer token verification.
      </p>
    </main>
  </div>
</body>
</html>
